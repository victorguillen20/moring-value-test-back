server:
  port: 8080

spring:
  application:
    name: torneo-galactico
  datasource:
    url: jdbc:h2:mem:torneogalactico;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:default-dev-secret-32-chars-min-required-para-HS256}
  expiration-ms: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://torneo-galactico-front.onrender.com}

logging:
  level:
    root: INFO
    com.morning.torneo: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
